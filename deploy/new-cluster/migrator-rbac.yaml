apiVersion: v1
kind: ServiceAccount
metadata:
  name: migrator
  namespace: monitoring
  labels:
    app.kubernetes.io/name: migrator
    app.kubernetes.io/component: migration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migrator-mimir-runtime
  namespace: monitoring
  labels:
    app.kubernetes.io/name: migrator
    app.kubernetes.io/component: migration
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["mimir-runtime"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migrator-mimir-runtime
  namespace: monitoring
  labels:
    app.kubernetes.io/name: migrator
    app.kubernetes.io/component: migration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: migrator-mimir-runtime
subjects:
  - kind: ServiceAccount
    name: migrator
    namespace: monitoring
