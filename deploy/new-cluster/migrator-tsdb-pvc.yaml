apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: migrator-tsdb
  namespace: monitoring
  labels:
    app.kubernetes.io/name: migrator
    app.kubernetes.io/component: migration
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""  # TODO: set to actual storage class (e.g. nfs-client, cephfs)
  resources:
    requests:
      storage: 400Gi
