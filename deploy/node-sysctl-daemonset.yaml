apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-sysctl
  namespace: monitoring
  labels:
    app.kubernetes.io/name: node-sysctl
    app.kubernetes.io/component: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-sysctl
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-sysctl
        app.kubernetes.io/component: node-tuning
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      initContainers:
        - name: set-sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -eu
              sysctl -w vm.max_map_count=1048576
              sysctl -w fs.file-max=1048576
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests: {cpu: 10m, memory: 8Mi}
            limits:   {cpu: 20m, memory: 16Mi}
