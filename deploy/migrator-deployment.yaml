apiVersion: apps/v1
kind: Deployment
metadata:
  name: migrator
  namespace: monitoring
  labels:
    app.kubernetes.io/name: migrator
    app.kubernetes.io/component: migration
spec:
  replicas: 1
  # Recreate, not RollingUpdate: the old pod holds the TSDB lock file
  # until asynq drain completes, so a new pod cannot open the shared DB
  # until the old one exits.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: migrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrator
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: migrator
      nodeSelector:
        kubernetes.io/hostname: kp-k8s-worker-1
      securityContext:
        runAsUser: 65534   # match TSDB hostPath owner (nobody)
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: migrator
          image: docker.io/mimir-openstack-tenant-migrator/migrator:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis-master.monitoring.svc.cluster.local:6379"
            - name: CORTEX_URL
              value: "http://cortex-tenant.monitoring.svc.cluster.local:8080/push"
            - name: TSDB_PATH
              value: "/data/tsdb"
            - name: HTTP_ADDR
              value: ":8090"
            - name: MAX_BATCH_BYTES
              value: "3145728"
            - name: WRITER_CONCURRENCY
              value: "4"
            - name: QUEUE_CONCURRENCY
              value: "8"  # Target for 64 GiB / 16 vCPU workers. Drop to 4 or lower on smaller nodes.
            - name: DRY_RUN
              value: "false"
            - name: HISTORY_LOG_PATH
              value: "/var/log/migrator/history.jsonl"
          volumeMounts:
            - name: tsdb-data
              mountPath: /data/tsdb
            - name: history-log
              mountPath: /var/log/migrator
          resources:
            # Sized for QUEUE_CONCURRENCY × WRITER_CONCURRENCY in-flight
            # batches on a 64 GiB / 16 vCPU worker. Scale down for smaller
            # nodes (and drop QUEUE_CONCURRENCY in lock-step).
            requests:
              cpu: "2"
              memory: "16Gi"
            limits:
              cpu: "6"
              memory: "28Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          # startupProbe suppresses liveness and readiness failures while
          # the TSDB WAL replays. 600s ceiling (60 × 10s); tighten after
          # measuring replay time on your TSDB. Targets /readyz so the
          # probe succeeds when the shared TSDB open completes.
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: tsdb-data
          hostPath:
            path: /mnt/data_dump/data
            type: Directory
        - name: history-log
          emptyDir: {}
      # Covers the asynq drain budget (ASYNQ_SHUTDOWN_TIMEOUT_SECONDS,
      # default 100s) plus headroom for TSDB close + HTTP shutdown +
      # Redis close. K8s default 30s is too short.
      terminationGracePeriodSeconds: 120
      restartPolicy: Always
